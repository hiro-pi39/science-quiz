<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>呪術理科戦｜動物①</title>
<style>
:root{
  --bg:#05050d;--card:#0c0c20;--card2:#12122a;
  --purple:#7c3aed;--purple2:#6d28d9;--pglow:rgba(124,58,237,.45);
  --blue:#3b82f6;--accent:#a78bfa;--text:#e8e0f8;--sub:#6060a0;
  --ok:#10b981;--ng:#ef4444;--gold:#f59e0b;--border:rgba(124,58,237,.35);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
  background-image:radial-gradient(ellipse at 15% 40%,rgba(124,58,237,.08) 0%,transparent 55%),radial-gradient(ellipse at 85% 60%,rgba(59,130,246,.06) 0%,transparent 55%);}

/* ===== TOP ===== */
#top-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px 20px;}
.jjk-logo{font-size:11px;letter-spacing:4px;color:var(--accent);margin-bottom:4px;}
.jjk-title{font-size:28px;font-weight:900;text-align:center;margin-bottom:4px;line-height:1.2;
  background:linear-gradient(135deg,#c4b5fd,#7c3aed,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.jjk-sub{font-size:14px;color:var(--sub);text-align:center;margin-bottom:16px;}
.jjk-divider{width:60px;height:2px;background:linear-gradient(90deg,transparent,var(--purple),transparent);margin:0 auto 16px;}

/* モード切替 */
.mode-toggle{display:flex;gap:8px;margin-bottom:16px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:4px;}
.mode-btn{flex:1;padding:10px 16px;border:none;border-radius:9px;font-size:13px;font-weight:bold;cursor:pointer;color:var(--sub);background:transparent;transition:all .2s;}
.mode-btn.active{background:var(--purple);color:white;box-shadow:0 0 12px var(--pglow);}

.level-label{font-size:12px;color:var(--sub);text-align:center;margin-bottom:12px;letter-spacing:2px;}
.level-buttons{display:flex;flex-direction:column;gap:10px;width:100%;max-width:340px;}
.lvl-btn{padding:12px 14px;border:1px solid var(--border);border-radius:14px;background:var(--card);display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(0,0,0,.4);}
.lvl-btn:active{transform:scale(.97);}
.lvl-left{display:flex;align-items:center;gap:10px;}
.char-icon-sm{width:46px;height:46px;flex-shrink:0;}
.lvl-name{font-size:14px;font-weight:bold;color:var(--text);}
.lvl-count{font-size:11px;color:var(--sub);margin-top:2px;}
.lvl-arrow{font-size:18px;color:var(--sub);}
.btn-retry-list{padding:12px 14px;border:1px solid rgba(239,68,68,.4);border-radius:14px;background:rgba(239,68,68,.08);display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all .2s;}
.btn-retry-list:active{transform:scale(.97);}
.retry-disabled{opacity:.35;cursor:default;pointer-events:none;}
.top-stats{margin-top:16px;font-size:12px;color:var(--sub);text-align:center;}

/* ===== 共通ヘッダー ===== */
.page-header{background:rgba(12,12,32,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:12px;}
.back-btn{background:rgba(124,58,237,.15);border:1px solid var(--border);color:var(--accent);font-size:20px;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.page-header-info{flex:1;min-width:0;}
.page-header-title{font-size:14px;font-weight:bold;color:var(--accent);}
.page-header-sub{font-size:11px;color:var(--sub);}
.prog-wrap{background:rgba(255,255,255,.07);border-radius:4px;height:4px;margin-top:6px;overflow:hidden;}
.prog-fill{background:linear-gradient(90deg,var(--purple),var(--blue));height:100%;border-radius:4px;transition:width .4s;}

/* ===== QUIZ ===== */
#quiz-screen{display:none;min-height:100vh;}
.q-body{padding:16px 16px 130px;max-width:500px;margin:0 auto;}
.score-row{display:flex;gap:8px;margin-bottom:14px;}
.sc-item{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:9px 6px;text-align:center;}
.sc-num{font-size:20px;font-weight:900;}
.sc-label{font-size:10px;color:var(--sub);margin-top:1px;}
.sc-item.ok .sc-num{color:var(--ok);}
.sc-item.ng .sc-num{color:var(--ng);}
.sc-item.total .sc-num{color:var(--accent);}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px 16px;margin-bottom:12px;box-shadow:0 6px 24px rgba(0,0,0,.5);}
.q-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.q-num{font-size:12px;color:var(--sub);}
.q-lvl-badge{padding:2px 10px;border-radius:20px;font-size:11px;font-weight:bold;}
.lvl-A{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.3);}
.lvl-B{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.3);}
.lvl-C{background:rgba(167,139,250,.15);color:#c4b5fd;border:1px solid rgba(167,139,250,.3);}
.hist-badge{padding:2px 10px;border-radius:20px;font-size:11px;}
.hist-new{background:rgba(255,255,255,.06);color:var(--sub);}
.hist-good{background:rgba(16,185,129,.12);color:#34d399;border:1px solid rgba(16,185,129,.25);}
.hist-mid{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.25);}
.hist-bad{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.25);}
.q-text{font-size:18px;font-weight:bold;line-height:1.75;color:var(--text);}
.ans-reveal-btn{width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--purple2),var(--blue));color:white;font-size:16px;font-weight:bold;cursor:pointer;box-shadow:0 0 18px var(--pglow);margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .1s;}
.ans-reveal-btn:active{transform:scale(.97);}
.ans-card{background:var(--card2);border:1px solid rgba(167,139,250,.35);border-radius:14px;padding:16px;margin-bottom:10px;display:none;box-shadow:0 0 20px rgba(124,58,237,.15);}
.ans-card.show{display:block;animation:fadeUp .3s ease;}
.ans-label{font-size:11px;color:var(--accent);letter-spacing:1px;margin-bottom:8px;}
.ans-text{font-size:20px;font-weight:900;color:var(--text);line-height:1.6;margin-bottom:12px;}

/* やり直しボタン */
.retry-toggle-btn{width:100%;padding:11px;border-radius:10px;font-size:13px;font-weight:bold;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;}
.retry-toggle-btn.add{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.35);}
.retry-toggle-btn.added{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.35);}
.retry-toggle-btn:active{transform:scale(.97);}

.res-btns{display:none;gap:10px;margin-bottom:12px;}
.res-btns.show{display:flex;animation:fadeUp .3s ease;}
.res-btn{flex:1;padding:15px 8px;border:none;border-radius:14px;font-size:15px;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:transform .1s;box-shadow:0 4px 14px rgba(0,0,0,.4);}
.res-btn:active{transform:scale(.97);}
.res-ok{background:linear-gradient(135deg,#065f46,#10b981);color:white;}
.res-ng{background:linear-gradient(135deg,#7f1d1d,#ef4444);color:white;}
.next-btn{width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,#065f46,#059669);color:white;font-size:15px;font-weight:bold;cursor:pointer;display:none;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 18px rgba(5,150,105,.35);transition:transform .1s;margin-bottom:12px;}
.next-btn.show{display:flex;animation:fadeUp .3s ease;}
.next-btn:active{transform:scale(.97);}
.hist-dots-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px;display:none;}
.hist-dots-wrap.show{display:block;}
.hist-dots-title{font-size:11px;color:var(--sub);margin-bottom:8px;letter-spacing:1px;}
.hist-dots{display:flex;flex-wrap:wrap;gap:5px;}
.hdot{width:22px;height:22px;border-radius:50%;font-size:9px;font-weight:bold;color:white;display:flex;align-items:center;justify-content:center;}
.hdot-ok{background:var(--ok);}
.hdot-ng{background:var(--ng);}
.hdot-now{background:var(--purple);box-shadow:0 0 8px var(--pglow);}

/* キャラポップアップ */
.char-popup{position:fixed;bottom:0;left:0;right:0;z-index:50;padding:10px 16px 18px;background:linear-gradient(to top,rgba(5,5,13,1) 60%,rgba(5,5,13,0));display:none;}
.char-popup.show{display:block;animation:slideUp .35s cubic-bezier(.34,1.56,.64,1);}
.char-popup-inner{max-width:500px;margin:0 auto;background:var(--card2);border-radius:20px;border:1px solid var(--border);padding:12px 14px;display:flex;align-items:center;gap:12px;box-shadow:0 0 28px var(--pglow);}
.char-popup-inner.ok-glow{border-color:rgba(16,185,129,.5);box-shadow:0 0 22px rgba(16,185,129,.25);}
.char-popup-inner.ng-glow{border-color:rgba(239,68,68,.5);box-shadow:0 0 22px rgba(239,68,68,.25);}
.char-face-md{width:64px;height:64px;flex-shrink:0;}
.char-info .char-name-tag{font-size:11px;color:var(--accent);margin-bottom:3px;letter-spacing:1px;}
.char-info .char-say{font-size:15px;font-weight:bold;color:var(--text);line-height:1.5;}

/* ===== 全問一覧 ===== */
#list-screen{display:none;min-height:100vh;}
.list-body{padding:12px 16px 40px;max-width:500px;margin:0 auto;}
.list-filter{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;}
.list-filter-btn{padding:7px 14px;border:1px solid var(--border);border-radius:20px;font-size:12px;font-weight:bold;background:var(--card);color:var(--sub);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s;}
.list-filter-btn.active{background:var(--purple);color:white;border-color:var(--purple);box-shadow:0 0 10px var(--pglow);}
.list-item{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:8px;overflow:hidden;transition:border-color .2s;}
.list-item.open{border-color:rgba(167,139,250,.5);}
.list-q-row{padding:14px 16px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;}
.list-q-left{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.list-q-num{font-size:11px;color:var(--sub);min-width:24px;}
.list-q-text{font-size:14px;font-weight:bold;color:var(--text);flex:1;line-height:1.6;}
.list-q-arrow{font-size:16px;color:var(--sub);flex-shrink:0;transition:transform .25s;}
.list-item.open .list-q-arrow{transform:rotate(180deg);color:var(--accent);}
.list-ans-row{display:none;padding:0 16px 14px;}
.list-item.open .list-ans-row{display:block;animation:fadeUp .25s ease;}
.list-ans-label{font-size:11px;color:var(--accent);margin-bottom:6px;}
.list-ans-text{font-size:16px;font-weight:900;color:var(--text);margin-bottom:10px;line-height:1.5;}
.list-retry-btn{padding:8px 14px;border-radius:8px;font-size:12px;font-weight:bold;cursor:pointer;transition:all .2s;border:none;}
.list-retry-btn.add{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.3);}
.list-retry-btn.added{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3);}
.list-retry-btn:active{transform:scale(.97);}
.retry-badge{display:inline-block;padding:1px 8px;background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3);border-radius:20px;font-size:10px;margin-left:6px;}

/* ===== RESULT ===== */
#result-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 20px;background:radial-gradient(ellipse at 50% 0%,rgba(124,58,237,.2) 0%,transparent 60%);}
.result-char{width:110px;height:110px;margin-bottom:10px;filter:drop-shadow(0 0 18px var(--pglow));}
.result-title{font-size:26px;font-weight:900;text-align:center;margin-bottom:4px;background:linear-gradient(135deg,#c4b5fd,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.result-char-say{font-size:14px;color:var(--accent);text-align:center;margin-bottom:4px;font-weight:bold;}
.result-sub{font-size:12px;color:var(--sub);margin-bottom:22px;}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:22px;width:100%;max-width:340px;margin-bottom:22px;box-shadow:0 0 28px var(--pglow);}
.result-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:14px;}
.result-row:last-child{border:none;}
.rval{font-size:21px;font-weight:900;}
.rval-ok{color:var(--ok);}
.rval-ng{color:var(--ng);}
.rval-gold{color:var(--gold);}
.result-actions{display:flex;flex-direction:column;gap:10px;width:100%;max-width:340px;}
.r-btn{padding:16px;border:none;border-radius:14px;font-size:15px;font-weight:bold;cursor:pointer;transition:transform .1s;}
.r-btn:active{transform:scale(.97);}
.r-retry{background:linear-gradient(135deg,var(--purple2),var(--purple));color:white;box-shadow:0 4px 18px var(--pglow);}
.r-weak{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.3);}
.r-home{background:rgba(255,255,255,.05);color:var(--sub);border:1px solid var(--border);}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideUp{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<!-- ===== TOP ===== -->
<div id="top-screen">
  <div class="jjk-logo">呪術廻戦 × 理科</div>
  <h1 class="jjk-title">動物① 一問一答</h1>
  <p class="jjk-sub">第3回 理科の基本事項</p>
  <div class="jjk-divider"></div>

  <div class="mode-toggle">
    <button class="mode-btn active" id="mode-quiz" onclick="setMode('quiz')">📝 1問1答</button>
    <button class="mode-btn" id="mode-list" onclick="setMode('list')">📋 全問一覧</button>
  </div>

  <p class="level-label">── 難易度を選べ ──</p>
  <div class="level-buttons">
    <button class="lvl-btn" onclick="go('A')">
      <div class="lvl-left"><div class="char-icon-sm" id="icon-A"></div>
        <div><div class="lvl-name">レベル A <span style="font-size:11px;font-weight:normal;color:var(--sub)">かんたん</span></div><div class="lvl-count">37問 ／ 虎杖と修行！</div></div>
      </div><span class="lvl-arrow">›</span>
    </button>
    <button class="lvl-btn" onclick="go('B')">
      <div class="lvl-left"><div class="char-icon-sm" id="icon-B"></div>
        <div><div class="lvl-name">レベル B <span style="font-size:11px;font-weight:normal;color:var(--sub)">ふつう</span></div><div class="lvl-count">14問 ／ 伏黒と特訓！</div></div>
      </div><span class="lvl-arrow">›</span>
    </button>
    <button class="lvl-btn" onclick="go('C')">
      <div class="lvl-left"><div class="char-icon-sm" id="icon-C"></div>
        <div><div class="lvl-name">レベル C <span style="font-size:11px;font-weight:normal;color:var(--sub)">むずかしい</span></div><div class="lvl-count">4問 ／ 五条に挑戦！</div></div>
      </div><span class="lvl-arrow">›</span>
    </button>
    <button class="lvl-btn" onclick="go('ALL')">
      <div class="lvl-left"><div class="char-icon-sm" id="icon-ALL"></div>
        <div><div class="lvl-name">全レベル <span style="font-size:11px;font-weight:normal;color:var(--sub)">A〜C 全55問</span></div><div class="lvl-count">呪術師への道！</div></div>
      </div><span class="lvl-arrow">›</span>
    </button>
    <button class="btn-retry-list" id="btn-retry" onclick="go('RETRY')">
      <div class="lvl-left"><div class="char-icon-sm" id="icon-RETRY"></div>
        <div><div class="lvl-name" style="color:#f87171;">やり直し問題</div><div class="lvl-count" id="retry-count">まだ登録なし</div></div>
      </div><span class="lvl-arrow" style="color:#f87171;">›</span>
    </button>
  </div>
  <div class="top-stats" id="top-stats">まず難易度を選んでスタート！</div>
</div>

<!-- ===== QUIZ ===== -->
<div id="quiz-screen">
  <div class="page-header">
    <button class="back-btn" onclick="goHome()">‹</button>
    <div class="page-header-info">
      <div class="page-header-title" id="q-header-title">動物① クイズ</div>
      <div class="page-header-sub" id="q-header-sub">問題 1/37</div>
      <div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
  </div>
  <div class="q-body">
    <div class="score-row">
      <div class="sc-item total"><div class="sc-num" id="sc-total">0</div><div class="sc-label">回答数</div></div>
      <div class="sc-item ok"><div class="sc-num" id="sc-ok">0</div><div class="sc-label">正解</div></div>
      <div class="sc-item ng"><div class="sc-num" id="sc-ng">0</div><div class="sc-label">不正解</div></div>
    </div>
    <div class="q-card">
      <div class="q-meta">
        <span class="q-num" id="q-num">問題 1</span>
        <span class="q-lvl-badge lvl-A" id="q-lvl">A</span>
        <span class="hist-badge hist-new" id="q-hist">はじめて</span>
      </div>
      <div class="q-text" id="q-text">問題文</div>
    </div>
    <button class="ans-reveal-btn" id="reveal-btn" onclick="revealAnswer()">⚡ タップして解答を見る</button>
    <div class="ans-card" id="ans-card">
      <div class="ans-label">▸ 解　答</div>
      <div class="ans-text" id="ans-text">解答</div>
      <button class="retry-toggle-btn add" id="retry-toggle" onclick="toggleRetryFromQuiz()">＋ やり直し問題に追加</button>
    </div>
    <div class="res-btns" id="res-btns">
      <button class="res-btn res-ok" onclick="recordAnswer(true)">⭕ 正解</button>
      <button class="res-btn res-ng" onclick="recordAnswer(false)">✖ 不正解</button>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題へ ›</button>
    <div class="hist-dots-wrap" id="hist-dots-wrap">
      <div class="hist-dots-title">▸ 回答履歴</div>
      <div class="hist-dots" id="hist-dots"></div>
    </div>
  </div>
  <div class="char-popup" id="char-popup">
    <div class="char-popup-inner" id="char-popup-inner">
      <div class="char-face-md" id="popup-face"></div>
      <div class="char-info">
        <div class="char-name-tag" id="popup-name">虎杖悠仁</div>
        <div class="char-say" id="popup-say">「やった！正解！」</div>
      </div>
    </div>
  </div>
</div>

<!-- ===== 全問一覧 ===== -->
<div id="list-screen">
  <div class="page-header">
    <button class="back-btn" onclick="goHome()">‹</button>
    <div class="page-header-info">
      <div class="page-header-title" id="list-header-title">全問一覧</div>
      <div class="page-header-sub" id="list-header-sub">全55問</div>
    </div>
  </div>
  <div class="list-body">
    <div class="list-filter">
      <button class="list-filter-btn active" onclick="filterList('ALL',this)">すべて</button>
      <button class="list-filter-btn" onclick="filterList('A',this)">レベルA</button>
      <button class="list-filter-btn" onclick="filterList('B',this)">レベルB</button>
      <button class="list-filter-btn" onclick="filterList('C',this)">レベルC</button>
      <button class="list-filter-btn" onclick="filterList('RETRY',this)">⚠ やり直し</button>
    </div>
    <div id="list-container"></div>
  </div>
</div>

<!-- ===== RESULT ===== -->
<div id="result-screen">
  <div class="result-char" id="result-char"></div>
  <div class="result-title" id="result-title">呪力覚醒！</div>
  <div class="result-char-say" id="result-char-say">「すごいぞ！」</div>
  <div class="result-sub" id="result-sub">全問完了</div>
  <div class="result-card">
    <div class="result-row"><span>総問題数</span><span class="rval" id="r-total">0問</span></div>

  {id:48,level:'B',q:'ウシやヤギなどが食べ物を一度飲み込んだあと、再び口に戻してよく噛む行動を何といいますか。',a:'反芻（はんすう）'},
  {id:49,level:'B',q:'グッピー、ウミタナゴのように、卵がメスの体内でかえって子の形で生まれてくる生まれ方を何といいますか。',a:'卵胎生'},
  {id:50,level:'B',q:'タツノオトシゴは何類ですか。',a:'魚類'},
  {id:51,level:'B',q:'哺乳類だが、卵で生まれてくる動物を2つ答えなさい。',a:'カモノハシ、ハリモグラ'},
  {id:52,level:'C',q:'主に肺呼吸をしている魚は何ですか。',a:'ハイギョ'},
  {id:53,level:'C',q:'およそ2億個の卵を産む魚は何ですか。',a:'マンボウ'},
  {id:54,level:'C',q:'ニワトリの親鳥が、卵黄を殻の内側にくっつけないように卵をひっくり返すことを何といいますか。',a:'転卵'},
  {id:55,level:'C',q:'ウシやヤギの胃はいくつありますか。',a:'4つ'},
];

// ===== Storage =====
let qHistory={}, retryList={};
function loadAll(){
  try{const d=localStorage.getItem('jjk_hist');if(d)qHistory=JSON.parse(d);}catch(e){}
  try{const d=localStorage.getItem('jjk_retry');if(d)retryList=JSON.parse(d);}catch(e){}
}
function saveHistory(id,isOk){const k=String(id);if(!qHistory[k])qHistory[k]={c:0,i:0};isOk?qHistory[k].c++:qHistory[k].i++;try{localStorage.setItem('jjk_hist',JSON.stringify(qHistory));}catch(e){}}
function addRetry(id){retryList[String(id)]=true;try{localStorage.setItem('jjk_retry',JSON.stringify(retryList));}catch(e){}}
function removeRetry(id){delete retryList[String(id)];try{localStorage.setItem('jjk_retry',JSON.stringify(retryList));}catch(e){}}
function isInRetry(id){return !!retryList[String(id)];}
function getRetryQuestions(){return allQuestions.filter(q=>retryList[String(q.id)]);}

// ===== 状態 =====
let curMode='quiz', curLevel='A', questions=[], curIdx=0, okCount=0, ngCount=0, sesHist=[], answered=false;

function setMode(m){
  curMode=m;
  document.getElementById('mode-quiz').className='mode-btn'+(m==='quiz'?' active':'');
  document.getElementById('mode-list').className='mode-btn'+(m==='list'?' active':'');
}

function go(level){
  if(curMode==='quiz') startQuiz(level);
  else showListScreen(level);
}

// ===== トップ更新 =====
function updateTop(){
  loadAll();
  const retry=getRetryQuestions();
  const btn=document.getElementById('btn-retry');
  const cnt=document.getElementById('retry-count');
  if(retry.length>0){btn.classList.remove('retry-disabled');cnt.textContent=retry.length+'問登録中';}
  else{btn.classList.add('retry-disabled');cnt.textContent='まだ登録なし';}
  let total=0,correct=0;Object.values(qHistory).forEach(h=>{total+=h.c+h.i;correct+=h.c;});
  document.getElementById('top-stats').textContent=total>0?'累計 '+total+'問回答 / 正解率 '+Math.round(correct/total*100)+'%':'まず難易度を選んでスタート！';
}

function updateHistBadge(id){
  const el=document.getElementById('q-hist');const h=qHistory[String(id)];
  if(!h||(h.c+h.i===0)){el.textContent='はじめて';el.className='hist-badge hist-new';}
  else{const t=h.c+h.i,rate=h.c/t;const cls=rate>=.8?'hist-good':rate>=.5?'hist-mid':'hist-bad';el.textContent='過去: ⭕'+h.c+' ✖'+h.i;el.className='hist-badge '+cls;}
}

// ===== QUIZ =====
function startQuiz(level){
  curLevel=level;
  if(level==='ALL') questions=[...allQuestions];
  else if(level==='RETRY') questions=getRetryQuestions();
  else questions=allQuestions.filter(q=>q.level===level);
  if(questions.length===0){alert('やり直し問題がまだ登録されていません！');return;}
  for(let i=questions.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[questions[i],questions[j]]=[questions[j],questions[i]];}
  curIdx=0;okCount=0;ngCount=0;sesHist=[];answered=false;
  hidePopup();
  document.getElementById('top-screen').style.display='none';
  document.getElementById('result-screen').style.display='none';
  document.getElementById('list-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='block';
  const names={A:'レベルA｜虎杖と修行！',B:'レベルB｜伏黒と特訓！',C:'レベルC｜五条に挑戦！',ALL:'全レベル｜呪術師への道',RETRY:'やり直し問題｜釘崎と復習！'};
  document.getElementById('q-header-title').textContent=names[level];
  showQuestion();
}

function showQuestion(){
  answered=false; hidePopup();
  const q=questions[curIdx],total=questions.length;
  document.getElementById('q-header-sub').textContent='問題 '+(curIdx+1)+' / '+total;
  document.getElementById('prog-fill').style.width=(curIdx/total*100)+'%';
  document.getElementById('q-num').textContent='問題 '+(curIdx+1)+'（全'+total+'問中）';
  const le=document.getElementById('q-lvl');le.textContent=q.level;le.className='q-lvl-badge lvl-'+q.level;
  updateHistBadge(q.id);
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('ans-text').textContent=q.a;
  document.getElementById('reveal-btn').style.display='flex';
  document.getElementById('ans-card').classList.remove('show');
  document.getElementById('res-btns').classList.remove('show');
  document.getElementById('next-btn').classList.remove('show');
  // やり直しボタン初期化
  updateRetryToggleBtn(q.id);
  updateScore();updateDots();
}

function updateRetryToggleBtn(id){
  const btn=document.getElementById('retry-toggle');
  if(curLevel==='RETRY'){
    // やり直し問題モード：リストから外すを表示
    btn.textContent='✕ やり直しリストから外す';
    btn.className='retry-toggle-btn added';
  } else if(isInRetry(id)){
    btn.textContent='✓ やり直し登録済み（タップで解除）';
    btn.className='retry-toggle-btn added';
  } else {
    btn.textContent='＋ やり直し問題に追加';
    btn.className='retry-toggle-btn add';
  }
}

function toggleRetryFromQuiz(){
  const id=questions[curIdx].id;
  if(isInRetry(id)){
    removeRetry(id);
    const btn=document.getElementById('retry-toggle');
    btn.textContent='＋ やり直し問題に追加';
    btn.className='retry-toggle-btn add';
  } else {
    addRetry(id);
    const btn=document.getElementById('retry-toggle');
    btn.textContent='✓ やり直し登録済み（タップで解除）';
    btn.className='retry-toggle-btn added';
  }
}

function revealAnswer(){
  document.getElementById('reveal-btn').style.display='none';
  document.getElementById('ans-card').classList.add('show');
  document.getElementById('res-btns').classList.add('show');
}

function recordAnswer(isOk){
  if(answered)return; answered=true;
  isOk?okCount++:ngCount++;
  sesHist.push(isOk);
  saveHistory(questions[curIdx].id,isOk);
  // 不正解は自動でやり直しリストへ
  if(!isOk){ addRetry(questions[curIdx].id); updateRetryToggleBtn(questions[curIdx].id); }
  updateScore();updateDots();
  document.getElementById('res-btns').classList.remove('show');
  // キャラ表示（3連続正解→五条）
  const streak=sesHist.slice(-3).filter(v=>v).length===3;
  const charKey=(streak&&isOk)?'gojo':(LEVEL_CHAR[curLevel]||'itadori');
  showCharPopup(charKey,isOk);
  const nb=document.getElementById('next-btn');
  nb.textContent=curIdx===questions.length-1?'🏁 結果を見る':'次の問題へ ›';
  nb.classList.add('show');
}

function nextQuestion(){hidePopup();if(curIdx===questions.length-1){showResult();return;}curIdx++;showQuestion();}
function updateScore(){document.getElementById('sc-total').textContent=okCount+ngCount;document.getElementById('sc-ok').textContent=okCount;document.getElementById('sc-ng').textContent=ngCount;}
function updateDots(){
  const wrap=document.getElementById('hist-dots-wrap');
  if(sesHist.length===0&&!answered){wrap.classList.remove('show');return;}
  wrap.classList.add('show');
  const c=document.getElementById('hist-dots');c.innerHTML='';
  sesHist.forEach((ok,i)=>{const d=document.createElement('div');d.className='hdot '+(ok?'hdot-ok':'hdot-ng');d.textContent=i+1;c.appendChild(d);});
  if(!answered){const d=document.createElement('div');d.className='hdot hdot-now';d.textContent=sesHist.length+1;c.appendChild(d);}
}

// ===== キャラポップアップ =====
function showCharPopup(charKey,isOk){
  const ch=CHARS[charKey];
  const msgs=isOk?ch.okMsgs:ch.ngMsgs;
  const msg=msgs[Math.floor(Math.random()*msgs.length)];
  document.getElementById('popup-face').innerHTML=ch.svg;
  document.getElementById('popup-name').textContent=ch.name;
  document.getElementById('popup-say').textContent='「'+msg+'」';
  const inner=document.getElementById('char-popup-inner');
  inner.className='char-popup-inner '+(isOk?'ok-glow':'ng-glow');
  const popup=document.getElementById('char-popup');
  popup.classList.remove('show');void popup.offsetWidth;
  popup.style.display='block';popup.classList.add('show');
}
function hidePopup(){const p=document.getElementById('char-popup');p.style.display='none';p.classList.remove('show');}

// ===== 全問一覧 =====
function showListScreen(level){
  document.getElementById('top-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('result-screen').style.display='none';
  document.getElementById('list-screen').style.display='block';
  const names={A:'レベルA（37問）',B:'レベルB（14問）',C:'レベルC（4問）',ALL:'全問一覧（55問）',RETRY:'やり直し問題'};
  document.getElementById('list-header-title').textContent='全問一覧';
  // フィルター初期化
  document.querySelectorAll('.list-filter-btn').forEach(b=>{
    b.classList.remove('active');
    const t=b.getAttribute('onclick').match(/'(\w+)'/)[1];
    if((level==='ALL'&&t==='ALL')||(level===t)) b.classList.add('active');
  });
  if(level==='ALL') document.querySelector('.list-filter-btn').classList.add('active');
  buildList(level);
}

function filterList(level, btnEl){
  document.querySelectorAll('.list-filter-btn').forEach(b=>b.classList.remove('active'));
  btnEl.classList.add('active');
  buildList(level);
}

function buildList(level){
  let qs;
  if(level==='ALL') qs=allQuestions;
  else if(level==='RETRY') qs=getRetryQuestions();
  else qs=allQuestions.filter(q=>q.level===level);
  document.getElementById('list-header-sub').textContent=qs.length+'問';
  const container=document.getElementById('list-container');
  container.innerHTML='';
  if(qs.length===0){container.innerHTML='<p style="color:var(--sub);text-align:center;padding:40px 0;">まだ登録されていません</p>';return;}
  qs.forEach(q=>{
    const inRetry=isInRetry(q.id);
    const item=document.createElement('div');
    item.className='list-item';
    item.innerHTML=`
      <div class="list-q-row" onclick="toggleListItem(this)">
        <div class="list-q-left">
          <span class="list-q-num">${q.id}</span>
          <span class="q-lvl-badge lvl-${q.level}">${q.level}</span>
          ${inRetry?'<span class="retry-badge">⚠やり直し</span>':''}
        </div>
        <div class="list-q-text">${q.q}</div>
        <span class="list-q-arrow">▼</span>
      </div>
      <div class="list-ans-row">
        <div class="list-ans-label">▸ 解答</div>
        <div class="list-ans-text">${q.a}</div>
        <button class="list-retry-btn ${inRetry?'added':'add'}" data-id="${q.id}" onclick="toggleRetryFromList(${q.id},this)">
          ${inRetry?'✓ やり直し登録済み（タップで解除）':'＋ やり直し問題に追加'}
        </button>
      </div>`;
    container.appendChild(item);
  });
}

function toggleListItem(row){
  const item=row.closest('.list-item');
  item.classList.toggle('open');
}

function toggleRetryFromList(id,btn){
  if(isInRetry(id)){
    removeRetry(id);
    btn.textContent='＋ やり直し問題に追加';
    btn.className='list-retry-btn add';
    // バッジ更新
    const row=btn.closest('.list-item').querySelector('.list-q-row');
    const badge=row.querySelector('.retry-badge');
    if(badge) badge.remove();
  } else {
    addRetry(id);
    btn.textContent='✓ やり直し登録済み（タップで解除）';
    btn.className='list-retry-btn added';
    const row=btn.closest('.list-item').querySelector('.list-q-row');
    if(!row.querySelector('.retry-badge')){
      const b=document.createElement('span');b.className='retry-badge';b.textContent='⚠やり直し';
      const lvlBadge=row.querySelector('.q-lvl-badge');
      lvlBadge.after(b);
    }
  }
  updateTop();
}

// ===== 結果 =====
function showResult(){
  hidePopup();
  const total=okCount+ngCount,rate=total>0?Math.round(okCount/total*100):0;
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('result-screen').style.display='flex';
  let charKey,title,say;
  if(rate>=90){charKey='gojo';title='完全領域制圧！';say='無下限…完璧だ。';}
  else if(rate>=70){charKey='itadori';title='呪力覚醒！';say='やったぞ！すごい！';}
  else if(rate>=50){charKey='megumi';title='修行の成果あり';say='…まあ、合格だ。';}
  else{charKey='sukuna';title='もっと修行が必要だ…';say='雑魚め。鍛え直せ。';}
  const rc=document.getElementById('result-char');
  rc.innerHTML=CHARS[charKey].svg;
  rc.style.filter='drop-shadow(0 0 18px '+CHARS[charKey].color+')';
  document.getElementById('result-title').textContent=title;
  document.getElementById('result-char-say').textContent='「'+say+'」 — '+CHARS[charKey].name;
  document.getElementById('result-sub').textContent=(curLevel==='RETRY'?'やり直し問題':'レベル'+curLevel)+' 全'+total+'問完了';
  document.getElementById('r-total').textContent=total+'問';
  document.getElementById('r-ok').textContent=okCount+'問';
  document.getElementById('r-ng').textContent=ngCount+'問';
  document.getElementById('r-rate').textContent=rate+'%';
  const retry=getRetryQuestions();
  const wb=document.getElementById('r-weak-btn');
  if(retry.length>0){wb.style.display='block';wb.textContent='⚠ やり直し問題を解く（'+retry.length+'問）';}
  else wb.style.display='none';
}

function retryQuiz(){startQuiz(curLevel);}
function goHome(){
  hidePopup();
  ['quiz-screen','result-screen','list-screen'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('top-screen').style.display='flex';
  updateTop();
}

// ===== 初期化 =====
loadAll(); updateTop();
renderSVG(document.getElementById('icon-A'),'itadori');
renderSVG(document.getElementById('icon-B'),'megumi');
renderSVG(document.getElementById('icon-C'),'gojo');
renderSVG(document.getElementById('icon-ALL'),'itadori');
renderSVG(document.getElementById('icon-RETRY'),'kugisaki');
</script>
