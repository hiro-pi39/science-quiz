<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>呪術理科戦｜動物①</title>
<style>
:root {
  --bg: #05050d;
  --card: #0c0c20;
  --card2: #12122a;
  --purple: #7c3aed;
  --purple2: #6d28d9;
  --purple-glow: rgba(124,58,237,0.45);
  --blue: #3b82f6;
  --accent: #a78bfa;
  --text: #e8e0f8;
  --sub: #6060a0;
  --ok: #10b981;
  --ng: #ef4444;
  --gold: #f59e0b;
  --border: rgba(124,58,237,0.35);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 15% 40%, rgba(124,58,237,0.08) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 60%, rgba(59,130,246,0.06) 0%, transparent 55%);
}

/* TOP */
#top-screen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 100vh; padding: 28px 20px;
}
.jjk-logo { font-size: 12px; letter-spacing: 4px; color: var(--accent); margin-bottom: 6px; }
.jjk-title {
  font-size: 30px; font-weight: 900; text-align: center;
  background: linear-gradient(135deg, #c4b5fd, #7c3aed, #3b82f6);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 4px; line-height: 1.2;
}
.jjk-sub { font-size: 15px; color: var(--sub); text-align: center; margin-bottom: 28px; }
.jjk-divider {
  width: 60px; height: 2px;
  background: linear-gradient(90deg, transparent, var(--purple), transparent);
  margin: 0 auto 24px;
}
.level-label { font-size: 13px; color: var(--sub); text-align: center; margin-bottom: 14px; letter-spacing: 2px; }
.level-buttons { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 340px; }

.lvl-btn {
  padding: 16px 20px; border: 1px solid var(--border);
  border-radius: 14px; background: var(--card);
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; transition: all 0.2s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.lvl-btn:active { transform: scale(0.97); }
.lvl-left { display: flex; align-items: center; gap: 14px; }
.lvl-badge {
  width: 42px; height: 42px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 900; flex-shrink: 0;
}
.lvl-name { font-size: 16px; font-weight: bold; color: var(--text); }
.lvl-count { font-size: 12px; color: var(--sub); margin-top: 2px; }
.lvl-arrow { font-size: 20px; color: var(--sub); }

.btn-A .lvl-badge { background: linear-gradient(135deg,#065f46,#10b981); box-shadow: 0 0 12px rgba(16,185,129,0.4); }
.btn-B .lvl-badge { background: linear-gradient(135deg,#1d4ed8,#3b82f6); box-shadow: 0 0 12px rgba(59,130,246,0.4); }
.btn-C .lvl-badge { background: linear-gradient(135deg,#7c3aed,#a78bfa); box-shadow: 0 0 12px rgba(124,58,237,0.4); }
.btn-ALL .lvl-badge { background: linear-gradient(135deg,#92400e,#f59e0b); box-shadow: 0 0 12px rgba(245,158,11,0.4); font-size:12px; }

.btn-weak {
  padding: 14px 20px; border: 1px solid rgba(239,68,68,0.4);
  border-radius: 14px; background: rgba(239,68,68,0.08);
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; transition: all 0.2s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.btn-weak:active { transform: scale(0.97); }
.btn-weak .lvl-badge { background: linear-gradient(135deg,#991b1b,#ef4444); box-shadow: 0 0 12px rgba(239,68,68,0.4); font-size:18px; }
.weak-disabled { opacity: 0.35; cursor: default; pointer-events: none; }

.top-stats { margin-top: 24px; font-size: 12px; color: var(--sub); text-align: center; }

/* QUIZ */
#quiz-screen { display: none; min-height: 100vh; }
.q-header {
  background: rgba(12,12,32,0.95); backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px; position: sticky; top: 0; z-index: 10;
  display: flex; align-items: center; gap: 12px;
}
.back-btn {
  background: rgba(124,58,237,0.15); border: 1px solid var(--border);
  color: var(--accent); font-size: 20px;
  width: 36px; height: 36px; border-radius: 50%;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.q-header-info { flex: 1; min-width: 0; }
.q-header-title { font-size: 14px; font-weight: bold; color: var(--accent); }
.q-header-sub { font-size: 11px; color: var(--sub); }
.prog-wrap { background: rgba(255,255,255,0.07); border-radius: 4px; height: 4px; margin-top: 6px; overflow: hidden; }
.prog-fill { background: linear-gradient(90deg, var(--purple), var(--blue)); height: 100%; border-radius: 4px; transition: width 0.4s; }

.q-body { padding: 20px 16px; max-width: 500px; margin: 0 auto; }

.score-row { display: flex; gap: 10px; margin-bottom: 18px; }
.sc-item {
  flex: 1; background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 10px 8px; text-align: center;
}
.sc-num { font-size: 22px; font-weight: 900; }
.sc-label { font-size: 10px; color: var(--sub); margin-top: 2px; }
.sc-item.ok .sc-num { color: var(--ok); }
.sc-item.ng .sc-num { color: var(--ng); }
.sc-item.total .sc-num { color: var(--accent); }

.q-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 18px; padding: 22px 18px; margin-bottom: 14px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(124,58,237,0.1);
}
.q-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.q-num { font-size: 12px; color: var(--sub); }
.q-lvl-badge { padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
.lvl-A { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
.lvl-B { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
.lvl-C { background: rgba(167,139,250,0.15); color: #c4b5fd; border: 1px solid rgba(167,139,250,0.3); }

.hist-badge { padding: 2px 10px; border-radius: 20px; font-size: 11px; }
.hist-new { background: rgba(255,255,255,0.06); color: var(--sub); }
.hist-good { background: rgba(16,185,129,0.12); color: #34d399; border: 1px solid rgba(16,185,129,0.25); }
.hist-mid { background: rgba(245,158,11,0.12); color: #fbbf24; border: 1px solid rgba(245,158,11,0.25); }
.hist-bad { background: rgba(239,68,68,0.12); color: #f87171; border: 1px solid rgba(239,68,68,0.25); }

.q-text { font-size: 18px; font-weight: bold; line-height: 1.75; color: var(--text); }

.ans-reveal-btn {
  width: 100%; padding: 18px; border: none; border-radius: 14px;
  background: linear-gradient(135deg, var(--purple2), var(--blue));
  color: white; font-size: 16px; font-weight: bold; cursor: pointer;
  box-shadow: 0 0 20px var(--purple-glow); margin-bottom: 14px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: transform 0.1s;
}
.ans-reveal-btn:active { transform: scale(0.97); }

.ans-card {
  background: var(--card2); border: 1px solid rgba(167,139,250,0.35);
  border-radius: 14px; padding: 18px; margin-bottom: 14px;
  display: none; box-shadow: 0 0 24px rgba(124,58,237,0.15);
}
.ans-card.show { display: block; animation: fadeUp 0.3s ease; }
.ans-label { font-size: 11px; color: var(--accent); letter-spacing: 1px; margin-bottom: 8px; }
.ans-text { font-size: 21px; font-weight: 900; color: var(--text); line-height: 1.6; }

.res-btns { display: none; gap: 10px; margin-bottom: 14px; }
.res-btns.show { display: flex; animation: fadeUp 0.3s ease; }
.res-btn {
  flex: 1; padding: 16px 8px; border: none; border-radius: 14px;
  font-size: 16px; font-weight: bold; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: transform 0.1s; box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}
.res-btn:active { transform: scale(0.97); }
.res-ok { background: linear-gradient(135deg, #065f46, #10b981); color: white; }
.res-ng { background: linear-gradient(135deg, #7f1d1d, #ef4444); color: white; }

.next-btn {
  width: 100%; padding: 18px; border: none; border-radius: 14px;
  background: linear-gradient(135deg, #065f46, #059669);
  color: white; font-size: 16px; font-weight: bold; cursor: pointer;
  display: none; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 4px 20px rgba(5,150,105,0.35); transition: transform 0.1s;
  margin-bottom: 14px;
}
.next-btn.show { display: flex; animation: fadeUp 0.3s ease; }
.next-btn:active { transform: scale(0.97); }

.hist-dots-wrap {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px; display: none;
}
.hist-dots-wrap.show { display: block; }
.hist-dots-title { font-size: 11px; color: var(--sub); margin-bottom: 10px; letter-spacing: 1px; }
.hist-dots { display: flex; flex-wrap: wrap; gap: 6px; }
.hdot {
  width: 24px; height: 24px; border-radius: 50%;
  font-size: 9px; font-weight: bold; color: white;
  display: flex; align-items: center; justify-content: center;
}
.hdot-ok { background: var(--ok); }
.hdot-ng { background: var(--ng); }
.hdot-now { background: var(--purple); box-shadow: 0 0 8px var(--purple-glow); }

/* RESULT */
#result-screen {
  display: none; flex-direction: column; align-items: center;
  justify-content: center; min-height: 100vh; padding: 32px 20px;
  background: radial-gradient(ellipse at 50% 0%, rgba(124,58,237,0.2) 0%, transparent 60%);
}
.result-kanji { font-size: 64px; margin-bottom: 8px; }
.result-title {
  font-size: 28px; font-weight: 900; text-align: center; margin-bottom: 6px;
  background: linear-gradient(135deg, #c4b5fd, #a78bfa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.result-sub { font-size: 14px; color: var(--sub); margin-bottom: 28px; }
.result-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 24px; width: 100%; max-width: 340px;
  margin-bottom: 28px; box-shadow: 0 0 32px var(--purple-glow);
}
.result-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 15px;
}
.result-row:last-child { border: none; }
.rval { font-size: 22px; font-weight: 900; }
.rval-ok { color: var(--ok); }
.rval-ng { color: var(--ng); }
.rval-gold { color: var(--gold); }

.result-actions { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 340px; }
.r-btn {
  padding: 18px; border: none; border-radius: 14px;
  font-size: 16px; font-weight: bold; cursor: pointer; transition: transform 0.1s;
}
.r-btn:active { transform: scale(0.97); }
.r-retry { background: linear-gradient(135deg, var(--purple2), var(--purple)); color: white; box-shadow: 0 4px 20px var(--purple-glow); }
.r-weak { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
.r-home { background: rgba(255,255,255,0.05); color: var(--sub); border: 1px solid var(--border); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<!-- TOP -->
<div id="top-screen">
  <div class="jjk-logo">呪術廻戦 × 理科</div>
  <h1 class="jjk-title">動物① 一問一答</h1>
  <p class="jjk-sub">第3回 理科の基本事項</p>
  <div class="jjk-divider"></div>

  <p class="level-label">── 難易度を選べ ──</p>
  <div class="level-buttons">
    <button class="lvl-btn btn-A" onclick="startQuiz('A')">
      <div class="lvl-left">
        <div class="lvl-badge">A</div>
        <div><div class="lvl-name">レベル A <span style="font-size:12px;font-weight:normal;color:var(--sub)">かんたん</span></div><div class="lvl-count">37問</div></div>
      </div><span class="lvl-arrow">›</span>
    </button>
    <button class="lvl-btn btn-B" onclick="startQuiz('B')">
      <div class="lvl-left">
        <div class="lvl-badge">B</div>
        <div><div class="lvl-name">レベル B <span style="font-size:12px;font-weight:normal;color:var(--sub)">ふつう</span></div><div class="lvl-count">14問</div></div>
      </div><span class="lvl-arrow">›</span>
    </button>
    <button class="lvl-btn btn-C" onclick="startQuiz('C')">
      <div class="lvl-left">
        <div class="lvl-badge">C</div>
        <div><div class="lvl-name">レベル C <span style="font-size:12px;font-weight:normal;color:var(--sub)">むずかしい</span></div><div class="lvl-count">4問</div></div>
      </div><span class="lvl-arrow">›</span>
    </button>
    <button class="lvl-btn btn-ALL" onclick="startQuiz('ALL')">
      <div class="lvl-left">
        <div class="lvl-badge" style="font-size:12px;">全</div>
        <div><div class="lvl-name">全レベル <span style="font-size:12px;font-weight:normal;color:var(--sub)">A〜C</span></div><div class="lvl-count">全55問</div></div>
      </div><span class="lvl-arrow">›</span>
    </button>
    <button class="btn-weak" id="btn-weak" onclick="startQuiz('WEAK')">
      <div class="lvl-left">
        <div class="lvl-badge">✖</div>
        <div><div class="lvl-name" style="color:#f87171;">苦手問題だけ解く</div><div class="lvl-count" id="weak-count">不正解だった問題のみ</div></div>
      </div><span class="lvl-arrow" style="color:#f87171;">›</span>
    </button>
  </div>
  <div class="top-stats" id="top-stats">まず難易度を選んでスタート！</div>
</div>

<!-- QUIZ -->
<div id="quiz-screen">
  <div class="q-header">
    <button class="back-btn" onclick="goHome()">‹</button>
    <div class="q-header-info">
      <div class="q-header-title" id="q-header-title">動物① クイズ</div>
      <div class="q-header-sub" id="q-header-sub">問題 1/37</div>
      <div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
  </div>
  <div class="q-body">
    <div class="score-row">
      <div class="sc-item total"><div class="sc-num" id="sc-total">0</div><div class="sc-label">回答数</div></div>
      <div class="sc-item ok"><div class="sc-num" id="sc-ok">0</div><div class="sc-label">正解</div></div>
      <div class="sc-item ng"><div class="sc-num" id="sc-ng">0</div><div class="sc-label">不正解</div></div>
    </div>
    <div class="q-card">
      <div class="q-meta">
        <span class="q-num" id="q-num">問題 1</span>
        <span class="q-lvl-badge lvl-A" id="q-lvl">A</span>
        <span class="hist-badge hist-new" id="q-hist">はじめて</span>
      </div>
      <div class="q-text" id="q-text">問題文</div>
    </div>
    <button class="ans-reveal-btn" id="reveal-btn" onclick="revealAnswer()">⚡ タップして解答を見る</button>
    <div class="ans-card" id="ans-card">
      <div class="ans-label">▸ 解　答</div>
      <div class="ans-text" id="ans-text">解答</div>
    </div>
    <div class="res-btns" id="res-btns">
      <button class="res-btn res-ok" onclick="recordAnswer(true)">⭕ 正解</button>
      <button class="res-btn res-ng" onclick="recordAnswer(false)">✖ 不正解</button>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題へ ›</button>
    <div class="hist-dots-wrap" id="hist-dots-wrap">
      <div class="hist-dots-title">▸ 回答履歴</div>
      <div class="hist-dots" id="hist-dots"></div>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="result-screen">
  <div class="result-kanji" id="result-kanji">⚡</div>
  <div class="result-title" id="result-title">領域展開！</div>
  <div class="result-sub" id="result-sub">全問完了</div>
  <div class="result-card">
    <div class="result-row"><span>総問題数</span><span class="rval" id="r-total">0問</span></div>
    <div class="result-row"><span>正解</span><span class="rval rval-ok" id="r-ok">0問</span></div>
    <div class="result-row"><span>不正解</span><span class="rval rval-ng" id="r-ng">0問</span></div>
    <div class="result-row"><span>正解率</span><span class="rval rval-gold" id="r-rate">0%</span></div>
  </div>
  <div class="result-actions">
    <button class="r-btn r-retry" onclick="retryQuiz()">🔄 もう一度やる</button>
    <button class="r-btn r-weak" id="r-weak-btn" style="display:none" onclick="startQuiz('WEAK')">✖ 苦手問題を復習する</button>
    <button class="r-btn r-home" onclick="goHome()">🏠 トップへ戻る</button>
  </div>
</div>

<script>
const allQuestions = [
  {id:1,level:'A',q:'メダカを飼うとき、水そうはどのようなところに置きますか。',a:'直射日光のあたらない明るいところ'},
  {id:2,level:'A',q:'メダカのひれは何種類何枚ですか。',a:'5種類7枚'},
  {id:3,level:'A',q:'メダカのひれで、オスとメスで形が違うひれを2つ答えなさい。',a:'背びれ、尻びれ'},
  {id:4,level:'A',q:'オスのメダカの背びれは切れ込みがありますか、ないですか。また、尻びれは何に近い形をしていますか。',a:'切れ込み…ある　形…平行四辺形'},
  {id:5,level:'A',q:'メスのメダカの背びれは切れ込みがありますか、ないですか。また、尻びれは何に近い形をしていますか。',a:'切れ込み…ない　形…三角形'},
  {id:6,level:'A',q:'メダカが産卵するのは、関東地方では何月から何月ですか。',a:'5〜9月'},
  {id:7,level:'A',q:'メダカが産卵をはじめるのは、昼の長さが何時間以上になったときですか。',a:'13時間以上'},
  {id:8,level:'A',q:'メダカが産卵をするのは、1日のうちのいつですか。',a:'早朝'},
  {id:9,level:'A',q:'メダカの卵の直径はおよそ何mmですか。',a:'およそ1.2mm（1.0〜1.5mm）'},
  {id:10,level:'A',q:'メダカの卵は25℃の水温ではおよそ何日で孵化しますか。',a:'およそ10日（およそ11日）'},
  {id:11,level:'A',q:'魚類の体表面にある、水流の変化・水圧・振動などを感じる器官を何といいますか。',a:'側線'},
  {id:12,level:'A',q:'オタマジャクシがカエルに変化するとき、最初に出るのは前足ですか、後ろ足ですか。',a:'後ろ足'},
  {id:13,level:'A',q:'ツバメ、カッコウ、ホトトギスのように、春になると日本に渡り秋に南へ戻っていく鳥を何といいますか。',a:'夏鳥'},
  {id:14,level:'A',q:'ハクチョウ、ガン、カモ、ツル、ツグミのように、冬になると日本に渡り春に北へ戻っていく鳥を何といいますか。',a:'冬鳥'},
  {id:15,level:'A',q:'腸がより長いのは、肉食動物か、草食動物のどちらですか。',a:'草食動物'},
  {id:16,level:'A',q:'外気温が変化すると体温も変化する動物を何といいますか。',a:'変温動物'},
  {id:17,level:'A',q:'外気温が変化しても体温をほぼ一定に保つことができる動物を何といいますか。',a:'恒温動物'},
  {id:18,level:'A',q:'クジラは何類ですか。',a:'哺乳類'},
  {id:19,level:'A',q:'ペンギンは何類ですか。',a:'鳥類'},
  {id:20,level:'A',q:'コウモリは何類ですか。',a:'哺乳類'},
  {id:21,level:'A',q:'メダカのひれで、2枚あるひれを2つ答えなさい。',a:'胸びれ、腹びれ'},

// ===== 履歴（localStorage） =====
let qHistory = {};
function loadHistory() {
  try { const d=localStorage.getItem('jjk_hist'); if(d) qHistory=JSON.parse(d); } catch(e){}
}
function saveHistory(id, isOk) {
  const k=String(id);
  if(!qHistory[k]) qHistory[k]={c:0,i:0};
  isOk ? qHistory[k].c++ : qHistory[k].i++;
  try { localStorage.setItem('jjk_hist', JSON.stringify(qHistory)); } catch(e){}
}
function updateHistBadge(id) {
  const el=document.getElementById('q-hist');
  const h=qHistory[String(id)];
  if(!h||(h.c+h.i===0)){
    el.textContent='はじめて'; el.className='hist-badge hist-new';
  } else {
    const t=h.c+h.i, rate=h.c/t;
    const cls=rate>=0.8?'hist-good':rate>=0.5?'hist-mid':'hist-bad';
    el.textContent='過去: ⭕'+h.c+' ✖'+h.i; el.className='hist-badge '+cls;
  }
}
function getWeakQuestions() {
  return allQuestions.filter(q=>{ const h=qHistory[String(q.id)]; return h&&h.i>0; });
}

// ===== 状態 =====
let curLevel='A', questions=[], curIdx=0, okCount=0, ngCount=0, sesHist=[], answered=false;

// ===== TOP更新 =====
function updateTop() {
  loadHistory();
  const weak=getWeakQuestions();
  const btn=document.getElementById('btn-weak');
  const cnt=document.getElementById('weak-count');
  if(weak.length>0){
    btn.classList.remove('weak-disabled');
    cnt.textContent=weak.length+'問（不正解があった問題）';
  } else {
    btn.classList.add('weak-disabled');
    cnt.textContent='まだ不正解なし';
  }
  let total=0,correct=0;
  Object.values(qHistory).forEach(h=>{total+=h.c+h.i;correct+=h.c;});
  document.getElementById('top-stats').textContent =
    total>0 ? '累計 '+total+'問回答 / 正解率 '+Math.round(correct/total*100)+'%'
            : 'まず難易度を選んでスタート！';
}

// ===== クイズ開始 =====
function startQuiz(level) {
  curLevel=level;
  if(level==='ALL') questions=[...allQuestions];
  else if(level==='WEAK') questions=getWeakQuestions();
  else questions=allQuestions.filter(q=>q.level===level);
  if(questions.length===0){alert('まだ不正解の問題がありません！');return;}

  // Fisher-Yatesシャッフル（毎回ランダム順）
  for(let i=questions.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [questions[i],questions[j]]=[questions[j],questions[i]];
  }
  curIdx=0;okCount=0;ngCount=0;sesHist=[];answered=false;
  document.getElementById('top-screen').style.display='none';
  document.getElementById('result-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='block';
  const names={A:'レベルA',B:'レベルB',C:'レベルC',ALL:'全レベル',WEAK:'苦手問題'};
  document.getElementById('q-header-title').textContent='動物① ｜ '+names[level];
  showQuestion();
}

// ===== 問題表示 =====
function showQuestion() {
  answered=false;
  const q=questions[curIdx], total=questions.length;
  document.getElementById('q-header-sub').textContent='問題 '+(curIdx+1)+' / '+total;
  document.getElementById('prog-fill').style.width=(curIdx/total*100)+'%';
  document.getElementById('q-num').textContent='問題 '+(curIdx+1)+'（全'+total+'問中）';
  const lvlEl=document.getElementById('q-lvl');
  lvlEl.textContent=q.level; lvlEl.className='q-lvl-badge lvl-'+q.level;
  updateHistBadge(q.id);
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('ans-text').textContent=q.a;
  document.getElementById('reveal-btn').style.display='flex';
  document.getElementById('ans-card').classList.remove('show');
  document.getElementById('res-btns').classList.remove('show');
  document.getElementById('next-btn').classList.remove('show');
  updateScore(); updateDots();
}

// ===== 解答表示 =====
function revealAnswer() {
  document.getElementById('reveal-btn').style.display='none';
  document.getElementById('ans-card').classList.add('show');
  document.getElementById('res-btns').classList.add('show');
}

// ===== 正解・不正解記録 =====
function recordAnswer(isOk) {
  if(answered) return;
  answered=true;
  isOk ? okCount++ : ngCount++;
  sesHist.push(isOk);
  saveHistory(questions[curIdx].id, isOk);
  updateScore(); updateDots();
  document.getElementById('res-btns').classList.remove('show');
  const nb=document.getElementById('next-btn');
  nb.textContent=curIdx===questions.length-1?'🏁 結果を見る':'次の問題へ ›';
  nb.classList.add('show');
}

// ===== 次の問題 =====
function nextQuestion() {
  if(curIdx===questions.length-1){showResult();return;}
  curIdx++; showQuestion();
}

// ===== スコア =====
function updateScore() {
  document.getElementById('sc-total').textContent=okCount+ngCount;
  document.getElementById('sc-ok').textContent=okCount;
  document.getElementById('sc-ng').textContent=ngCount;
}

// ===== 履歴ドット =====
function updateDots() {
  const wrap=document.getElementById('hist-dots-wrap');
  if(sesHist.length===0&&!answered){wrap.classList.remove('show');return;}
  wrap.classList.add('show');
  const c=document.getElementById('hist-dots');
  c.innerHTML='';
  sesHist.forEach((ok,i)=>{
    const d=document.createElement('div');
    d.className='hdot '+(ok?'hdot-ok':'hdot-ng');
    d.textContent=i+1; c.appendChild(d);
  });
  if(!answered){
    const d=document.createElement('div');
    d.className='hdot hdot-now'; d.textContent=sesHist.length+1; c.appendChild(d);
  }
}

// ===== 結果 =====
function showResult() {
  const total=okCount+ngCount, rate=total>0?Math.round(okCount/total*100):0;
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('result-screen').style.display='flex';
  let kanji='⚡',title='よくがんばった！';
  if(rate>=90){kanji='🏆';title='完全領域制圧！';}
  else if(rate>=70){kanji='⚡';title='呪力覚醒！';}
  else if(rate>=50){kanji='🌀';title='修行の成果あり';}
  else{kanji='💪';title='もっと修行が必要だ…';}
  document.getElementById('result-kanji').textContent=kanji;
  document.getElementById('result-title').textContent=title;
  document.getElementById('result-sub').textContent=
    (curLevel==='WEAK'?'苦手問題':'レベル'+curLevel)+' 全'+total+'問完了';
  document.getElementById('r-total').textContent=total+'問';
  document.getElementById('r-ok').textContent=okCount+'問';
  document.getElementById('r-ng').textContent=ngCount+'問';
  document.getElementById('r-rate').textContent=rate+'%';
  const weak=getWeakQuestions();
  const wb=document.getElementById('r-weak-btn');
  if(weak.length>0){wb.style.display='block';wb.textContent='✖ 苦手問題を復習する（'+weak.length+'問）';}
  else wb.style.display='none';
}

function retryQuiz(){startQuiz(curLevel);}
function goHome(){
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('result-screen').style.display='none';
  document.getElementById('top-screen').style.display='flex';
  updateTop();
}

loadHistory();
updateTop();
</script>
